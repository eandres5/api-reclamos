# Configuraciˇn para TESTS
# Usa H2 en memoria en vez de PostgreSQL

spring.application.name=api-reclamos-service-test

# H2 en memoria
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT
app.jwt.secret=Y2xhdmVTZWNyZXRhUGFyYVRlc3RzUXVlRGViZVNlckxhcmdhMjU2Qml0cw==
app.jwt.expiration-ms=3600000

# Logging reducido para tests
logging.level.ec.banco=WARN
logging.level.org.springframework.security=WARN